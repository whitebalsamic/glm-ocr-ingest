name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"
      - name: Install lint dependencies
        shell: bash
        run: |
          retry() {
            local attempts="$1"
            shift
            local try=1
            until "$@"; do
              if [ "$try" -ge "$attempts" ]; then
                return 1
              fi
              sleep $((try * 5))
              try=$((try + 1))
            done
          }

          python -m pip install --upgrade pip
          retry 3 python -m pip install "ruff>=0.11,<0.12"
      - name: Ruff
        run: python -m ruff check . && python -m ruff format --check .

  lint_311:
    name: lint (3.11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install lint dependencies
        shell: bash
        run: |
          retry() {
            local attempts="$1"
            shift
            local try=1
            until "$@"; do
              if [ "$try" -ge "$attempts" ]; then
                return 1
              fi
              sleep $((try * 5))
              try=$((try + 1))
            done
          }

          python -m pip install --upgrade pip
          retry 3 python -m pip install "ruff>=0.11,<0.12"
      - name: Ruff
        run: python -m ruff check . && python -m ruff format --check .

  unit:
    name: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"
      - name: Install unit dependencies
        shell: bash
        run: |
          retry() {
            local attempts="$1"
            shift
            local try=1
            until "$@"; do
              if [ "$try" -ge "$attempts" ]; then
                return 1
              fi
              sleep $((try * 5))
              try=$((try + 1))
            done
          }

          python -m pip install --upgrade pip
          retry 3 python -m pip install --no-deps -e .
          retry 3 python -m pip install "pytest>=8,<10"
      - name: CLI smoke test
        run: glm-ocr --help > /dev/null
      - name: Run tests
        run: pytest -q

  unit_311:
    name: unit (3.11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install unit dependencies
        shell: bash
        run: |
          retry() {
            local attempts="$1"
            shift
            local try=1
            until "$@"; do
              if [ "$try" -ge "$attempts" ]; then
                return 1
              fi
              sleep $((try * 5))
              try=$((try + 1))
            done
          }

          python -m pip install --upgrade pip
          retry 3 python -m pip install --no-deps -e .
          retry 3 python -m pip install "pytest>=8,<10"
      - name: CLI smoke test
        run: glm-ocr --help > /dev/null
      - name: Run tests
        run: pytest -q

  package:
    name: package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"
      - name: Install build tools
        run: python -m pip install --upgrade pip && python -m pip install build
      - name: Build package
        run: python -m build
